# robot.ini — Configuration for robot.py, robot_gui.py, robot_web.py
#
# All values here are defaults. Any setting can be overridden on the
# command line (e.g. --gps-port /dev/ttyUSB1 overrides [gps] port).
#
# Ports: use "auto" (or leave blank) where auto-detection is supported.

# ── Yukon / iBUS ────────────────────────────────────────────────────────────

[robot]
yukon_port  = auto          # Yukon USB serial port (auto = scan for RP2040)
ibus_port   = /dev/ttyAMA3  # FlySky iBUS receiver UART (GPIO 9, uart3-pi5)

# ── RC channel mapping & tuning ──────────────────────────────────────────────
#
# Channels are 1-based (CH1–CH14).
#
# Default transmitter layout:
#   CH1 = Aileron   (steering)
#   CH2 = Elevator
#   CH3 = Throttle
#   CH4 = Rudder
#   CH5 = SwA       (mode switch: low = MANUAL, high = AUTO)
#   CH6 = SwB       (speed limit: 1000 = slow, 1500 = mid, 2000 = max)
#   CH7 = SwC       (AUTO type:   1000 = Camera, 1500 = GPS, 2000 = Cam+GPS)
#   CH8 = SwD       (GPS logging: low = off, high = on)

[rc]
throttle_ch     = 3         # Throttle channel (1-based)
steer_ch        = 1         # Steering channel (1-based)
mode_ch         = 5         # MANUAL/AUTO switch channel — SwA (1-based)
speed_ch        = 6         # Speed-limit channel — SwB (1-based)
auto_type_ch    = 7         # AUTO type — SwC: 1000=Camera 1500=GPS 2000=Cam+GPS
gps_log_ch      = 8         # GPS logging — SwD: low=off, high=on
gps_bookmark_ch = 10         # GPS log bookmark — momentary button (0 = disabled)
deadzone        = 30        # Stick deadzone in µs either side of centre
failsafe_s      = 0.5       # Seconds without iBUS packet before failsafe
speed_min       = 0.25      # Speed scale when speed_ch is at low end (0.0–1.0)
control_hz      = 50        # Motor control loop rate in Hz

# ── Camera ───────────────────────────────────────────────────────────────────

[camera]
disabled    = false        # Set true to disable the camera subsystem
width       = 640
height      = 480
fps         = 30
rotation    = 180          # Display rotation in degrees: 0, 90, 180, or 270

# ── ArUco marker / gate detection ────────────────────────────────────────────
#
# Detects ArUco markers in every camera frame and identifies gate pairs.
# Gate pairs are consecutive odd+even IDs: tags 1+2 = gate 0, 3+4 = gate 1, …
# Annotated frames (green boxes, gate lines) are returned by get_frame().
# Access detection results via robot.get_aruco_state().

[aruco]
enabled     = false        # Set true to enable ArUco detection
dict        = DICT_4X4_1000  # ArUco dictionary to use

# ── Lidar (LDROBOT LD06) ─────────────────────────────────────────────────────
#
# GPIO 15 (RX) ← LD06 Tx    UART @ 230400 8N1, one-way stream
# GPIO 18 (PWM) → LD06 PWM  30 kHz, 40% duty ≈ 10 Hz scan rate
#
# Required overlays in /boot/firmware/config.txt:
#   dtoverlay=uart0-pi5              # GPIO 14/15 → /dev/ttyAMA0
#   dtoverlay=pwm,pin=18,func=2      # GPIO 18   → pwmchip0/pwm0

[lidar]
disabled    = true         # Set true to disable the lidar subsystem
port        = /dev/ttyAMA0

# ── GPS (Allystar TAU1308 RTK module) ────────────────────────────────────────

[gps]
disabled    = false         # Set true to disable the GPS subsystem
port        = /dev/ttyUSB0
log_dir     =               # GPS log directory (blank = logs/ next to robot.py)
log_hz      = 5             # GPS log rate in Hz (e.g. 1, 5, 10)

# ── NTRIP RTK corrections ────────────────────────────────────────────────────
#
# Leave host or mount blank to disable NTRIP entirely.
# RTK Float typically appears within 1–2 min; RTK Fixed within 5 min.
# For RTK2go, password = none and user = your@email.com.

[ntrip]
disabled    = false         # Set true to disable NTRIP corrections
host        = www.rtk2go.com              	# NTRIP caster hostname (e.g. www.rtk2go.com)
port        = 2101          				# NTRIP TCP port
mount       = CAMBRIDGE         			# Mountpoint name (e.g. CAMBRIDGE)
user        = brian.corteil@gmail.com       # Username / email
password    = none              			# Password (RTK2go: none)

# ── RTCM serial corrections (alternative to NTRIP) ───────────────────────────
#
# Connect a local RTK base station via USB/UART instead of a network caster.
# Serial takes priority over NTRIP when port is set.
# Leave port blank to use NTRIP (or no corrections if NTRIP is also blank).

[rtcm]
disabled    = true         # Set true to disable RTCM serial corrections
port        = /dev/ttyUSB1  # Serial device for RTCM input
baud        = 115200        # Baud rate

# ── Pygame GUI (robot_gui.py) ─────────────────────────────────────────────────

[gui]
fps         = 10            # Display refresh rate in Hz

# ── Web dashboard (robot_web.py) ─────────────────────────────────────────────

[web]
host        = 0.0.0.0       # Bind address (0.0.0.0 = all interfaces)
port        = 5000          # HTTP port
debug       = false         # Flask debug mode (do not use in production)
