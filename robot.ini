# robot.ini — Runtime configuration for HackyRacingRobot
#
# Sections:
#   [logging]            — Log level (DEBUG | INFO | WARNING | ERROR)
#   [robot]              — Serial ports for Yukon RP2040 board and iBUS RC receiver
#   [rc]                 — RC channel mapping and stick scaling
#   [camera]             — Legacy single-camera settings (kept for backward compat)
#   [camera_front_left]  — IMX296 global shutter, CSI CAM0 (Picamera2)
#   [camera_front_right] — IMX296 global shutter, CSI CAM1 (Picamera2)
#   [camera_rear]        — IMX477 HQ camera, USB/UVC (OpenCV)
#   [stereo]             — Hardware sync GPIO for front stereo pair
#   [aruco]              — ArUco marker detection dictionary, calibration and tag size
#   [battery]            — Battery chemistry and cell count for voltage thresholds
#   [imu]                — BNO085 rotation vector mode and logging
#   [lidar]              — LD06 LiDAR port
#   [gps]                — GNSS receiver port and logging
#   [ntrip]              — NTRIP RTK corrections caster credentials
#   [rtcm]               — Serial RTCM corrections (alternative to NTRIP)
#   [gui]                — Pygame GUI settings (robot_gui.py)
#   [web]                — Web dashboard settings (robot_web.py)
#   [mobile]             — Mobile dashboard settings (robot_mobile.py)
#   [navigator]          — ArUco gate navigator (aruco_navigator.py)
#   [gps_navigator]      — GPS waypoint navigator (gps_navigator.py)
#
# All values here are defaults.  Any setting can be overridden on the
# command line (e.g. --gps-port /dev/ttyUSB1 overrides [gps] port).
#
# IMPORTANT — run only ONE frontend at a time.
#   robot_gui.py, robot_web.py, and robot_mobile.py each create their own
#   Robot instance and claim the same serial ports (Yukon, iBUS, LiDAR, GPS).
#   Running two simultaneously causes port conflicts and undefined behaviour.
#
# Ports: use "auto" (or leave blank) where auto-detection is supported.


# ── Logging ──────────────────────────────────────────────────────────────────

[logging]
level               = INFO            # DEBUG | INFO | WARNING | ERROR


# ── Yukon / iBUS ─────────────────────────────────────────────────────────────

[robot]
yukon_port          = auto
ibus_port           = /dev/ttyAMA3


# ── RC channel mapping & tuning ──────────────────────────────────────────────
#
# Channels are 1-based (CH1–CH14).
#
# RadioMaster TX16S channel layout:
#   CH1  = Right X  (steering)
#   CH2  = Right Y
#   CH3  = Left Y   (forward/reverse)
#   CH4  = Left X
#   CH5  = SF   mode switch:   low = MANUAL, high = AUTO
#   CH6  = SE   speed select:  1000 = slow (speed_min), 1500 = mid (speed_mid), 2000 = full power
#   CH7  = SA   AUTO type:     1000 = Camera, 1500 = GPS, 2000 = Cam+GPS
#   CH8  = SB   GPS logging:   low = off, high = on
#   CH9  = SC   data logging:  low = off, high = on
#   CH10 = SD   AUTO pause:    low = running, mid/high = paused (no motors)
#   CH11 = SG   recording:     low = off, mid = front camera only, high = all cameras
#   CH12 = SH   GPS bookmark / ESTOP reset button (momentary, rising edge)

[rc]
throttle_ch         = 3
steer_ch            = 1
mode_ch             = 5
speed_ch            = 6
auto_type_ch        = 7
gps_log_ch          = 8
dlog_ch             = 9         # CH9  SC 2-pos: data log off / on  (0 = disabled)
rec_ch              = 11        # CH11 SG 3-pos: off / front cam only / all cams  (0 = disabled)
gps_bookmark_ch     = 12        # CH12 SH momentary: GPS bookmark or ESTOP reset
pause_ch            = 10        # CH10 SD 2-pos: running / paused  (0 = disabled)
deadzone            = 30        # µs either side of mid treated as zero
failsafe_s          = 0.5       # seconds without iBUS packet → failsafe
speed_min           = 0.25      # scale factor at low switch position
speed_mid           = 0.6       # scale factor at mid switch position (high = 1.0 always)
control_hz          = 50        # motor control loop rate in Hz


# ── Camera (legacy single-camera — kept for backward compatibility) ───────────
#
# Used by robot_gui.py, robot_web.py and robot_mobile.py which read this
# section directly.  Also used by robot_daemon.py as a fallback when
# [camera_front_left] is disabled or absent.
# Keep disabled = false so existing frontends continue to work.

[camera]
disabled            = false
width               = 640
height              = 480
fps                 = 15
rotation            = 180


# ── Front cameras — IMX296 global shutter (CSI, Picamera2) ───────────────────
#
# Two IMX296 modules on the Pi 5 CSI ports (CAM0 and CAM1).
# Global shutter eliminates rolling-shutter blur on a fast-moving robot —
# critical for reliable ArUco detection at competition speeds.
#
# Native full resolution: 1456 × 1088.
# ArUco detection runs on the full capture resolution; frames are downscaled
# to display_width × display_height before being sent to the UI and MJPEG
# streams, keeping display CPU and network load manageable.
#
# calib_file: calibration file produced by tools/calibrate_camera.py.
#   {capture_width}/{capture_height} are substituted at runtime.
#   Leave blank if not yet calibrated (pixel-only ArUco fallback is used).
#
# Stereo sync: both cameras share a hardware XVS trigger wire (see [stereo]).
# This aligns frame timing so the stereo pair captures simultaneously.

[camera_front_left]
disabled            = false
driver              = picamera2    # picamera2 | opencv | auto
camera_num          = 0            # CSI port: 0 = CAM0 (left)
capture_width       = 1456         # full IMX296 native resolution
capture_height      = 1088
display_width       = 640          # downscaled for UI and MJPEG streams
display_height      = 480
fps                 = 15           # 15 fps: sufficient for ArUco gate detection, halves CPU vs 30
rotation            = 180          # camera is physically mounted inverted
aruco               = true
calib_file          = camera_cal.npz

[camera_front_right]
disabled            = false
driver              = picamera2
camera_num          = 1            # CSI port: 1 = CAM1 (right)
capture_width       = 1456
capture_height      = 1088
display_width       = 640
display_height      = 480
fps                 = 15           # 15 fps: sufficient for ArUco gate detection, halves CPU vs 30
rotation            = 180          # camera is physically mounted inverted
aruco               = true
calib_file          = camera_cal.npz


# ── Rear camera — IMX477 HQ camera (USB/UVC, OpenCV) ─────────────────────────
#
# Raspberry Pi HQ camera (IMX477, 12 MP) connected via USB adapter.
# Used exclusively for ArUco gate-confirmation: after passing a gate the rear
# camera watches for that gate's tag pair to confirm passage.
#
# The USB device path can shift on reboot.  Install a udev rule to create
# the stable symlink /dev/camera_rear — see docs/SETUP.md for the rule.
# Fallback: if /dev/camera_rear is absent, the first available /dev/videoN
# is tried automatically.
#
# At 4056 × 3040 over USB, frame rate is limited to ~5–10 fps depending on
# the USB adapter's MJPEG support.
#
# mirror = true flips the frame horizontally so left/right match the robot's
# forward perspective when reviewing rear footage.

[camera_rear]
disabled            = false
driver              = opencv       # USB UVC — always OpenCV
device              = /dev/camera_rear   # udev symlink; falls back to /dev/video0
capture_width       = 4056         # full IMX477 native resolution
capture_height      = 3040
display_width       = 640
display_height      = 480
fps                 = 10           # USB bandwidth limit at full resolution
rotation            = 0
mirror              = true         # flip horizontally for natural rear-view
aruco               = true
calib_file          = camera_cal_rear_{capture_width}x{capture_height}.npz


# ── Stereo sync (front camera pair) ──────────────────────────────────────────
#
# Hardware sync (enabled = true):
#   A wire connects the XVS (vertical sync) pins of both IMX296 modules to a
#   single Pi GPIO.  On startup robot_daemon.py pulses this pin HIGH for 1 ms,
#   resetting both cameras' internal frame counters to the same phase so the
#   stereo pair captures frames simultaneously.  Requires python3-rpi.gpio.
#
# Software sync (enabled = false):
#   Cameras free-run in their own threads.  robot.get_stereo_frames() checks
#   the capture timestamp of each frame and only returns the pair when both
#   are within software_sync_max_skew_ms of each other.
#   At 15 fps (67 ms per frame) the typical skew is a few milliseconds;
#   100 ms is a generous one-and-a-half-frame tolerance.

[stereo]
enabled                   = false
sync_gpio                 = 24     # BCM GPIO — only used when enabled = true
software_sync_max_skew_ms = 100    # max age difference between stereo frames (ms)


# ── Depth mapping ────────────────────────────────────────────────────────────
#
# Dense depth estimation using the stereo front-camera pair (CPU) and/or the
# Hailo-8L AI Kit (monocular scdepthv3, 145 fps).
#
# mode:
#   stereo  — OpenCV StereoSGBM only; metric depth, no Hailo required.
#   mono    — Hailo scdepthv3 only; relative depth unless a stereo anchor fits.
#   fusion  — stereo fills metric values; mono fills gaps where stereo is
#             invalid (texture-less surfaces, overexposed regions).
#
# hailo_model: path relative to robot_daemon.py to the scdepthv3 .hef file.
#   Download with: python3 tools/setup_depth_model.py
#
# mono_scale_mode:
#   stereo  — fit a per-frame scale factor from valid stereo pixels (recommended).
#   none    — return raw relative depth (not metric).
#
# stereo_num_disp: disparity search range; must be divisible by 16.
#   Larger = longer range but higher CPU cost.  128 works well up to ~4–5 m.
#
# stereo_max_depth: depth values beyond this (metres) are masked as invalid.

[depth]
enabled                  = false
mode                     = fusion       # stereo | mono | fusion
hailo_model              = models/scdepthv3.hef
mono_scale_mode          = stereo       # stereo | none
mono_scale_percentile    = 50
stereo_min_disp          = 0
stereo_num_disp          = 128          # must be divisible by 16
stereo_block_size        = 9
stereo_max_depth         = 8.0          # metres


# ── Racing robot detector (Hailo-10H YOLOv8n) ───────────────────────────────
#
# Detects other racing robots in camera frames using a custom YOLOv8n model
# compiled to HEF format for the Hailo-10H AI HAT+ 2.
#
# Train and compile the model using docs/robot_detector_training.html.
# Enable per-camera by adding robot_detector = true to each [camera_*] section.
#
# conf  — confidence threshold (0–1).  Lower = more sensitive, more false
#         positives.  Raise to 0.55–0.65 if getting spurious detections.
# iou   — IoU threshold for NMS duplicate suppression.

[robot_detector]
enabled             = true
model               = models/robot_detector.hef
conf                = 0.6
iou                 = 0.3
# persist      — frames a detection must appear in consecutively before being
#                reported.  1 = off.  2 = eliminates single-frame false
#                positives.  3 = stricter but 2-frame latency on new robots.
persist             = 2
# match_radius — display-pixel radius within which two consecutive detections
#                are considered the same robot.  Larger = tolerates faster
#                moving robots; too large risks merging nearby robots.
match_radius        = 60


# ── ArUco marker / gate detection ────────────────────────────────────────────
#
# Detects ArUco markers in every camera frame and identifies gate pairs.
# Gate pairs: consecutive odd+even IDs — tags 1+2 = gate 0, 3+4 = gate 1, …
#
# calib_file template in each [camera_*] section overrides this per camera.
# tag_size must match across all cameras and the [navigator] section.

[aruco]
enabled             = true
dict                = DICT_4X4_250
calib_file          = camera_cal_{width}x{height}.npz
tag_size            = 0.15      # metres — measure your printed tags
area_k  = 113.860   # set to D*sqrt(A) after calibration measurement
hfov    = 62.0  # IMX296 horizontal FOV in degrees (adjust for your lens)


# ── Camera calibration files ─────────────────────────────────────────────────
#
# Resolutions for which calibration files are generated by
# tools/derive_calibrations.py.  Calibrate once at full sensor resolution,
# then run the tool to derive files for all other resolutions automatically.
# Separate calibration runs are needed for each physical camera.

[camera_calibrations]
resolutions         = 640x480, 1280x720, 1456x1088, 4056x3040


# ── Lidar (LDROBOT LD06) ─────────────────────────────────────────────────────
#
# GPIO 15 (RX) ← LD06 Tx UART @ 230400 8N1, one-way stream
# GPIO 18 (PWM) → LD06 PWM 30 kHz, 40% duty ≈ 10 Hz scan rate
#
# Required overlays in /boot/firmware/config.txt:
#   dtoverlay=uart0-pi5          # GPIO 14/15 → /dev/ttyAMA0
#   dtoverlay=pwm,pin=18,func=2  # GPIO 18 → pwmchip0/pwm0

[lidar]
disabled            = false
port                = /dev/ttyAMA0


# ── GPS (Allystar TAU1308 RTK module) ────────────────────────────────────────

[gps]
disabled            = false
port                = /dev/gnss
log_dir             =              # blank = logs/ subfolder next to robot_daemon.py
log_hz              = 5            # GPS log rows per second


# ── NTRIP RTK corrections ────────────────────────────────────────────────────
#
# Leave host or mount blank to disable NTRIP entirely.
# RTK Float typically appears within 1–2 min; RTK Fixed within 5 min.
# For RTK2go: password = none, user = your@email.com
#
# Credentials can also be supplied via environment variables (these take
# precedence over values in this file):
#   NTRIP_HOST, NTRIP_PORT, NTRIP_MOUNT, NTRIP_USER, NTRIP_PASSWORD

[ntrip]
disabled            = false
host                = www.rtk2go.com
port                = 2101
mount               = CAMBRIDGE
user                = brian.corteil@gmail.com             # set via NTRIP_USER env var or --ntrip-user
password            = none
# Approximate rover location sent in GGA before GPS acquires a fix.
# VRS mounts (e.g. RTK2Go) disconnect immediately if GGA shows lat=0,lon=0.
# Set these to within ~50 km of the actual operating area.
lat                 = 52.2
lon                 = 0.1
height              = 20.0         # metres above MSL


# ── RTCM serial corrections (alternative to NTRIP) ───────────────────────────
#
# Connect a local RTK base station via USB/UART instead of a network caster.
# Serial takes priority over NTRIP when port is set.
# Leave port blank (or disabled = true) to use NTRIP.

[rtcm]
disabled            = true
port                = /dev/sik
baud                = 115200


# ── SiK telemetry radio (tools/serial_telemetry.py) ─────────────────────────
#
# Holybro SiK V3 433 MHz radio connected via USB.
# When enabled, set [rtcm] disabled = true — serial_telemetry.py owns that port.
#
# port: fixed by udev rule — always /dev/sik regardless of USB enumeration order.
#   Rule file: /etc/udev/rules.d/99-hacky-robot.rules
#
# baud: must match the SiK radio's ATS1 parameter (S1 value × 100, e.g. S1=57 → 57600).
#   To change: miniterm /dev/sik 57600, send +++, then ATS1=57 / AT&W / ATZ
#   Repeat on BOTH radios.
#
# telemetry_hz: state packet downlink rate. 5 Hz uses ~500 B/s, leaving
#   headroom for LiDAR packets and RTCM uplink within the 64 kbps air link.
#
# lidar: include a subsampled LiDAR scan at 1 Hz (~600 B/packet).
#   Set false to save bandwidth when RTCM corrections are heavy.
#
# lidar_step: degrees between samples. 5 = 72 points; 10 = 36 points.

[telemetry_radio]
disabled     = true
port         = /dev/sik
baud         = 57600
telemetry_hz = 5
lidar        = true
lidar_step   = 5              ; degrees between samples (1–45)


# ── Output directories ────────────────────────────────────────────────────────
#
# Leave blank to use the defaults shown in parentheses.

[output]
images_dir              =          # blank = ~/Pictures/HackyRacingRobot
videos_dir              =          # blank = ~/Videos/HackyRacingRobot
data_log_dir            =          # blank = ~/Documents/HackyRacingRobot
max_recording_minutes   = 0        # 0 = unlimited; >0 rolls to a new .mp4 every N minutes


# ── NeoPixel LED strip (Yukon SLOT3) ─────────────────────────────────────────
#
# Pattern or colour name to display for each robot mode.
#
# Patterns  : larson, random, rainbow, retro_computer, converge, estop_flash
# Colours   : off, red, green, blue, orange, yellow, cyan, magenta, white
#
# estop_flash: LEDs 0-2 and 5-7 flash red; LEDs 3-4 show the fault colour.
#   yellow = Pi-side ESTOP / software fault  (sent by the daemon)
#   red    = Yukon hardware fault            (set by the Yukon firmware directly;
#                                             reserved — do not use for other purposes)

[leds]
manual              = larson          # MANUAL mode (RC control)
auto                = retro_computer  # AUTO mode (autonomous)
estop               = estop_flash     # ESTOP (software / manual kill)
rc_lost             = rc_lost         # RC radio signal lost (failsafe)
motor_fault         = motor_fault     # Yukon motor fault (fault_l / fault_r in telemetry)
fault_rotation_s    = 2.0             # seconds each fault is displayed before rotating


# ── GPIO buttons and status LEDs ─────────────────────────────────────────────
#
# Physical buttons and LEDs wired directly to the Pi 5 GPIO header.
# Requires the lgpio library (pip install lgpio).
#
# Set enabled = true once the hardware is fitted.
#
# Button wiring: connect between GPIO pin and GND; relies on Pi internal
# pull-up (active low).  A brief debounce is provided by lgpio's edge filter.
#
# LED wiring: GPIO → 330 Ω resistor → LED anode; cathode to GND.
# Active high (GPIO high = LED on).
#
[gpio]
enabled             = false           # set true when hardware is fitted

estop_btn_gpio      = 17              # active low — clears ESTOP, returns to MANUAL
start_btn_gpio      = 27              # active low — toggles MANUAL ↔ AUTO

led_estop_gpio      = 22              # active high, red
led_auto_gpio       = 23              # active high, green
led_manual_gpio     = 25              # active high, blue/amber


# ── Battery ──────────────────────────────────────────────────────────────────
#
# Chemistry and cell count determine the voltage thresholds used to colour-code
# the battery voltage indicator in the GUI top bar and trigger fault conditions.
#
# chemistry values and per-cell defaults:
#   lipo  : max 4.20 V  warn 3.50 V  critical 3.30 V  (most common)
#   liion : max 4.20 V  warn 3.40 V  critical 3.20 V
#   nimh  : max 1.45 V  warn 1.10 V  critical 1.00 V
#   lfe   : max 3.65 V  warn 3.00 V  critical 2.80 V
#
# Override individual thresholds (pack voltage, not per-cell) by setting
# voltage_warn or voltage_critical.  Leave blank to use chemistry × cells.

[battery]
chemistry           = lipo
cells               = 3
voltage_max         =          # blank = chemistry default × cells
voltage_warn        =          # blank = chemistry default × cells
voltage_critical    =          # blank = chemistry default × cells


# ── IMU (BNO085 on Yukon I2C / Qw-ST port) ───────────────────────────────────
#
# rotation_vector controls which BNO085 sensor fusion mode is used:
#
#   game     — Game Rotation Vector (accelerometer + gyroscope, NO magnetometer)
#              Heading is relative to orientation at power-on.
#              Immune to motor/wiring EMI.  Slight long-term gyro drift.
#              Best choice until magnetometer interference is characterised.
#
#   absolute — Absolute Rotation Vector (accel + gyro + magnetometer)
#              Heading referenced to magnetic north.
#              Accurate long-term but susceptible to motor magnetic field
#              interference.  Only use after magnetometer shielding tests pass.
#
# log_imu: include IMU data (heading, roll, pitch, linear accel, gyro,
#          stability) in the data log and ML log.

[imu]
rotation_vector     = game         # game | absolute
log_imu             = true


# ── Pygame GUI (robot_gui.py) ─────────────────────────────────────────────────
#
# display_mode controls the window size and fullscreen behaviour:
#   WxH          — specific resolution e.g. 1280x720
#   windowed     — default 1280x800 windowed
#   touchscreen  — 1280x720 landscape (physical screen rotated 90°)
#   fullscreen   — native desktop resolution, fullscreen
#
# strip_side: which side the touch button strip appears on.
#   left | right — configurable to suit mounting orientation.
#
# strip_width: width of the touch button strip in pixels.
#   Clamped to 120 px maximum at runtime regardless of value set here.
#
# double_tap_ms: maximum gap between two taps on the same quad panel to
#   be registered as a double-tap (expand/collapse).
#
# Layout presets define which panel fills each quad slot at startup.
# Slots are ordered: top-left, top-right, bottom-left, bottom-right.
# Available panel types:
#   front_left | front_right | rear | lidar | gps_sky | gps_track |
#   depth_map  | telemetry   | system | imu
#
# active_preset: name of the preset loaded at startup.

[gui]
fps                 = 10
display_mode        = touchscreen  # 1280x720 landscape touchscreen
strip_side          = right        # left | right
strip_width         = 100          # pixels, max 120
double_tap_ms       = 300          # ms — double-tap detection window

[layout_presets]
# Preset names are free-form — add, rename or remove as needed.
Race                = front_left, front_right, rear, lidar
Setup               = front_left, front_right, gps_sky, telemetry
Debug               = lidar, depth_map, gps_track, system
IMU                 = front_left, imu, rear, lidar
active_preset       = Race


# ── Unified dashboard (robot_dashboard.py) ───────────────────────────────────

[dashboard]
host                = 0.0.0.0
port                = 5000
debug               = false


# ── Legacy sections (kept for backward compatibility; robot_dashboard.py
#    falls back to [web] if [dashboard] is absent) ────────────────────────────

[web]
host                = 0.0.0.0
port                = 5000
debug               = false


[mobile]
host                = 0.0.0.0
port                = 5001
debug               = false


# ── ArUco gate navigator (aruco_navigator.py) ────────────────────────────────
#
# Autonomous navigation through ArUco gate pairs on a course.
# Set track_file to a track.toml (generated by tools/track_editor.html) to load
# per-gate tag IDs, heading hints, and a gate sequence with optional loop.
# Without track_file the navigator uses the formula: gate N → tags 2N + 2N+1.
#
# Single-tag fallback: if only one post is visible the robot aims to the
# side of that post where the gate opening should be.
#
# IMU features (require BNO085 fitted on Yukon):
#   - Heading hold between camera frames (smooth 50 Hz steering)
#   - Stepped search rotation (search_step_deg increments with pause)
#   - Straight-line PASSING on locked heading via Yukon bearing PID
#
# Tuning notes:
#   steer_kp      — increase if robot is slow to align; decrease if it oscillates
#   align_deadband — tighter = more precise alignment before approach
#   pass_distance  — distance (m) at which PASSING is triggered when both posts visible;
#                    single-tag fallback uses track.toml gate width_m instead
#   tag_offset_k   — controls aim point offset for single-tag fallback
#                    increase if robot clips the post; decrease if it drifts too wide

[navigator]
track_file          = track.toml  # path to track.toml; relative = resolved from robot.ini dir
max_gates           = 10          # fallback gate count when track_file is not set
tag_size            = 0.15        # metres — must match [aruco] tag_size
pass_distance       = 0.6         # metres — trigger PASSING state
pass_time           = 0.8         # seconds minimum before checking gate is clear
pass_timeout        = 4.0         # seconds maximum in PASSING before advancing regardless
search_mode         = serpentine   # "spin" (rotate in place) or "serpentine" (forward zigzag for grass)
search_speed        = 0.75        # speed while searching (rotation or forward crawl)
search_step_deg     = 45.0        # spin mode only: degrees per IMU-controlled step
search_step_pause   = 0.3         # spin mode only: pause between steps (seconds)
search_leg_time     = 4.0         # serpentine mode only: max seconds per leg (safety timeout if target heading not reached)
search_turn_bias    = 0.4         # serpentine mode only (no IMU fallback): steering fraction (0=straight, 1=max curve)
search_cone_deg     = 90.0        # serpentine mode only: total sweep arc in degrees (±45° each side of entry heading)
fwd_speed           = 0.75        # forward speed while approaching
align_fwd_speed     = 0.75        # forward speed while aligning (keep high to prevent motor stall)
steer_kp            = 0.45        # proportional gain on bearing error in ALIGNING (reduce if overshooting)
imu_kp              = 0.5         # IMU heading error gain
align_deadband      = 3.0         # degrees — within this = aligned
ramp_rate           = 2.0         # motor speed ramp rate (units/second)
tag_offset_k        = 0.4         # single-tag aim offset constant (m²)
pixel_offset_k      = 5000        # single-tag aim offset fallback (pixel mode)
max_single_tag_offset_deg = 45.0  # cap on single-tag angular offset — prevents aim point drifting
                                  # to extreme angles as robot closes in on a wide gate
cam_heading_offset  = 0.0 #23.3   # degrees to add to camera bearing before combining with IMU heading
                                  # (+ve = camera aims RIGHT of robot centreline; -ve = aims left)
                                  # Calibrate: with cam_heading_offset=0, aim dead-ahead at a tag, read
                                  # bearing_err from the ALIGNING debug log, then set to MINUS that value.
obstacle_stop_dist  = 0.5         # metres — halt if LiDAR sees obstacle closer than this
obstacle_cone_deg   = 60.0        # full width of forward cone for LiDAR obstacle check
recover_reverse_time  = 0.4       # seconds to reverse when gate lost mid-approach
recover_reverse_speed = 0.20      # reverse speed during recovery


# ── GPS waypoint navigator (gps_navigator.py) ────────────────────────────────
#
# Navigates through a sequence of GPS waypoints loaded from a JSON file.
# Waypoint file format:
#   [
#     {"lat": 52.123456, "lon": -0.123456, "label": "Start"},
#     {"lat": 52.123789, "lon": -0.123789, "label": "Gate 1"},
#     ...
#   ]
#
# Sensor fusion:
#   Each GPS fix (≤10 Hz) computes a Haversine bearing to the next waypoint
#   and sets the IMU target heading.  Between fixes the 50 Hz control loop
#   steers by IMU heading error alone — smooth and responsive.
#   Distance to waypoint is always from GPS (IMU has no position).
#
# min_fix_quality thresholds:
#   1 = Standard GPS (±3–5 m)    — adequate for large arrival_radius
#   2 = DGPS (±1–3 m)
#   4 = RTK Fixed (±0.02–0.05 m) — use with small arrival_radius
#   5 = RTK Float (±0.1–0.5 m)
## Tuning notes:
#   arrival_radius  — must be larger than your GPS h_error_m reading
#   spin_threshold  — robot rotates on the spot if heading error exceeds this;
#                     reduce if it overshoots turns on a tight course
#   steer_kp        — increase for faster heading correction; reduce if oscillating
#   fwd_speed       — reduce on a tight course or with poor GPS accuracy

[gps_navigator]
waypoints_file      = waypoints.json   # path relative to robot_daemon.py
arrival_radius      = 2.0              # metres — waypoint reached threshold
min_fix_quality     = 1                # minimum GPS fix quality to navigate
fwd_speed           = 0.5             # forward speed (0.0–1.0)
steer_kp            = 0.8             # proportional steering gain on heading error
steer_max           = 0.7             # maximum steering authority
arrival_pause       = 1.0             # seconds to pause at each waypoint
ramp_rate           = 2.0             # motor ramp rate (speed units/second)
imu_kp              = 1.0             # IMU heading error gain
spin_speed          = 0.3             # rotation speed for large heading corrections
spin_threshold      = 45.0            # degrees — spin on spot if error exceeds this
loop                = false           # true = repeat course from start when complete
lookahead_m         = 5.0             # metres — start blending toward next wp when within this distance
obstacle_stop_dist  = 0.5             # metres — halt if LiDAR sees obstacle closer than this
obstacle_cone_deg   = 60.0            # full width of forward cone for LiDAR obstacle check

# ── INA237 power monitor ───────────────────────────────────────────────────────
# Adafruit INA237 breakout (product 6340) on I2C1 (GPIO 2/3).
# Measures the 12 V input supply feeding the DC-DC converter that powers the Pi.
# Voltage, current, and power appear in the dashboard System panel when enabled.

[ina237]
enabled     = false     # set true once the sensor is wired up
address     = 0x40      # I2C address (A0+A1 unconnected = 0x40)
r_shunt     = 0.1       # shunt resistor in ohms (Adafruit breakout default)
max_current = 2.0       # maximum expected input current in amps
